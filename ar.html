<!DOCTYPE html>

<html>
<head>
    <title>AR Feature Tracking Scene</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #info{
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding:10px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
    </head>

<body style="margin:0">
    <div id = "info">
        <h2>AR Feature Tracking Scene</h2>
        <p>Point your camera at the marker to see the 3D objects.</p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled:false;">
        <a-marker type="pattern" url="markers/pattern-marker1.patt" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-box position="0 0.5 0" color="red"></a-box>
        </a-marker>
        
        <a-marker type="pattern" url="markers/pattern-marker2.patt" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-sphere position="0 0.5 0" radius="0.3" color="blue"></a-sphere>
        </a-marker>
        
        <a-marker type="pattern" url="markers/pattern-marker3.patt" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-cylinder position="0 0.5 0" radius="0.3" height="1" color="green"></a-cylinder>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

</body>

</html>
