<!DOCTYPE html>

<html>

<head>

<title>AR Scene</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0">

<a-scene embedded arjs='debugUIEnabled: true;'>

<!-- Marker 1 -->

<a-marker type="pattern" url="markers/pattern-marker1.patt">

<a-box 
position="0 0.5 0"
scale="1.5 1.5 1.5"
color="red">
</a-box>

</a-marker>


<!-- Marker 2 -->

<a-marker type="pattern" url="markers/pattern-marker2.patt">

<a-sphere 
position="0 0.5 0"
radius="0.5"
color="blue">
</a-sphere>

</a-marker>


<!-- Marker 3 -->

<a-marker type="pattern" url="markers/pattern-marker3.patt">

<a-cylinder 
position="0 0.5 0"
radius="0.4"
height="1"
color="green">
</a-cylinder>

</a-marker>


<a-entity camera></a-entity>

</a-scene>

</body>

</html>
